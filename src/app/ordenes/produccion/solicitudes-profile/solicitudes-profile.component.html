<div class="container_ mt-5">
    <div class="card">
        <div class="card-content darker">
          
            <span *ngIf="loading">Cargando...</span>
            <div class="card" *ngIf="!loading">
                <div class="card-content">
                    <span class="title" *ngIf="selected.numero">AL-SOL-{{selected.numero}}</span> ({{selected.status}})<br>
                    <span>{{selected.motivo}}</span> <br>
                    <span>{{selected.createdAt | date:'dd/MM/YYYY - hh:mm:ss a'}}</span> <br>
                    <button class="button is-success">
                        <span class="icon"><i class="fas fa-download"></i></span>
                        <span>Formato</span>
                    </button>
                    <hr>
                    <table class="table is-fullwidth is-striped">
                        <thead>
                            <tr>
                                <th>Material</th>
                                <th>Cantidad</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let material of selected.materiales">
                                <td>{{material.material.nombre}}</td>
                                <td>{{material.cantidad}} {{material.material.unidad}}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
