<div class="modal" [ngClass]="{'is-active':solicitudes}">
    <div class="modal-background"></div>
    <div class="modal-card animate__animated animate__fadeInUp" style="width: 40%;">
      <div class="modal-card-head">
        <p class="modal-card-title fuente">Solicitud de materiales</p>
        <button class="delete red_cross" aria-label="close" (click)="cerrar()"></button>
      </div>
  
      <div class="modal-card-body light" *ngIf="orden && solicitudes">
        <span class="title">{{orden.numero_op}} - {{orden.producto[0].identificacion.producto}}</span>
        <hr>

        <span *ngIf="loading">Cargando...</span>
  
        <table class="table is-fullwidth is-striped" *ngIf="!loading">
          <thead>
            <tr>
              <td>Material</td>
              <td>Cantidad</td>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>{{orden.sustrato.sustrato.nombre}}</td>
              <td>
                <input type="number" class="input" [(ngModel)]="orden_solicitud.sustrato.cantidad">
              </td>
            </tr>
  
            <tr *ngFor="let tinta of orden.tinta; let i = index">
              <td>{{tinta.tinta.nombre}} ({{tinta.tinta.fabricante.alias}})</td>
              <td>
                <input type="number" class="input" [(ngModel)]="orden_solicitud.tintas[i].cantidad">
              </td>
            </tr>
  
            <tr>
              <td>{{orden.barniz.barniz.nombre}}</td>
              <td>
                <input type="number" class="input" [(ngModel)]="orden_solicitud.barniz.cantidad">
              </td>
            </tr>
  
            <tr>
              <td>{{orden.pega.pega.nombre}}</td>
              <td>
                <input type="number" class="input" [(ngModel)]="orden_solicitud.pega.cantidad">
              </td>
            </tr>
          </tbody>
        </table>
  
        <hr>
        <div class="field is-grouped">
          <div class="control">
            <label class="label">Motivo</label>
            <div class="select">
              <select [(ngModel)]="orden_solicitud.motivo">
                <option *ngFor="let m of motivos" [value]="m">{{m}}</option>
              </select>
            </div>
          </div>
        </div>
  
        <button class="button is-success" (click)="generarSolicitud()">
          <span class="icon"><i class="fas fa-cart-arrow-down"></i></span>
          <span>Solicitar</span>
        </button>
      </div>
    </div>
  </div>
