<div class="modal" [ngClass]="{ 'is-active': cliente || editar }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente">
        <i class="fas mr-2" [ngClass]="editar ? 'fa-user-edit' : 'fa-user-plus'"></i>
        {{ editar ? 'Editar cliente' : 'Nuevo cliente' }}
      </p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar()" [disabled]="guardando"></button>
    </div>
    <div class="modal-card-body">
      <!-- Datos generales -->
      <span class="section-label"><i class="fas fa-id-card"></i> Datos generales</span>
      <hr class="modal-divider" />
      <div class="columns is-multiline">
        <div class="column is-4">
          <div class="field">
            <label class="label">Nombre del cliente</label>
            <div class="control has-icons-left">
              <input class="input" type="text" placeholder="Nombre" [(ngModel)]="data.nombre" />
              <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
            </div>
          </div>
        </div>
        <div class="column is-4">
          <div class="field">
            <label class="label">RIF</label>
            <div class="control has-icons-left">
              <input class="input" type="text" placeholder="J-XXXXXXXX-X" (input)="addGuion()" [(ngModel)]="data.rif" />
              <span class="icon is-small is-left"><i class="fas fa-file-invoice"></i></span>
            </div>
          </div>
        </div>
        <div class="column is-4">
          <div class="field">
            <label class="label">Código</label>
            <div class="control has-icons-left">
              <input class="input" type="text" placeholder="CLI-001" [(ngModel)]="data.codigo" />
              <span class="icon is-small is-left"><i class="fas fa-hashtag"></i></span>
            </div>
          </div>
        </div>
      </div>
      <div class="field">
        <label class="label">Dirección fiscal</label>
        <div class="control has-icons-left">
          <textarea class="textarea" placeholder="Dirección fiscal" [(ngModel)]="data.direccion"></textarea>
          <span class="icon is-left"><i class="fas fa-map-pin"></i></span>
        </div>
      </div>

      <!-- Contactos -->
      <span class="section-label"><i class="fas fa-address-book"></i> Contactos</span>
      <hr class="modal-divider" />
      <div class="columns is-multiline">
        <div class="column is-3">
          <div class="field">
            <label class="label">Título</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select [(ngModel)]="cliente_temporal.titulo">
                  <option value="Sr.">Sr.</option>
                  <option value="Sra.">Sra.</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="column is-3">
          <div class="field">
            <label class="label">Nombre</label>
            <div class="control has-icons-left">
              <input class="input" type="text" placeholder="Nombre" [(ngModel)]="cliente_temporal.nombre" />
              <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
            </div>
          </div>
        </div>
        <div class="column is-3">
          <div class="field">
            <label class="label">Cargo</label>
            <div class="control has-icons-left">
              <input class="input" type="text" placeholder="Cargo" [(ngModel)]="cliente_temporal.cargo" />
              <span class="icon is-small is-left"><i class="fas fa-briefcase"></i></span>
            </div>
          </div>
        </div>
        <div class="column is-3">
          <div class="field">
            <label class="label">Correo</label>
            <div class="control has-icons-left">
              <input class="input" type="text" placeholder="correo@ejemplo.com" [(ngModel)]="cliente_temporal.correo" />
              <span class="icon is-small is-left"><i class="fas fa-at"></i></span>
            </div>
          </div>
        </div>
        <div class="column is-3">
          <div class="field">
            <label class="label">Teléfono</label>
            <div class="control has-icons-left">
              <input class="input" type="text" placeholder="+58 412 123 4567" [(ngModel)]="cliente_temporal.telefono" />
              <span class="icon is-small is-left"><i class="fas fa-phone"></i></span>
            </div>
          </div>
        </div>
        <div class="column is-3 is-flex is-align-items-flex-end">
          <div class="field">
            <label class="label">&nbsp;</label>
            <div class="control">
              <button class="button is-info" (click)="aceptarCliente()" [disabled]="!cliente_temporal.nombre?.trim()">
                <span class="icon"><i class="fas fa-plus"></i></span>
                <span>Agregar</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="tags-list mb-3" *ngIf="data.contactos?.length">
        <span *ngFor="let contacto of data.contactos; index as i" class="tag is-info is-light is-medium">
          <i class="fas fa-user-tie mr-1"></i>
          {{ contacto.titulo || '' }} {{ contacto.nombre }}
          <span class="tag-sub" *ngIf="contacto.cargo"> — {{ contacto.cargo }}</span>
          <i class="fas fa-times tag-delete" (click)="confirmarEliminarContacto(i)"></i>
        </span>
      </div>

      <!-- Almacenes -->
      <span class="section-label"><i class="fas fa-warehouse"></i> Almacenes</span>
      <hr class="modal-divider" />
      <div class="columns is-multiline">
        <div class="column is-6">
          <div class="field">
            <label class="label">Nombre del almacén</label>
            <div class="control has-icons-left">
              <input class="input" type="text" placeholder="Ej: Caracas" [(ngModel)]="Almacene_temporal.nombre" />
              <span class="icon is-small is-left"><i class="fas fa-warehouse"></i></span>
            </div>
          </div>
        </div>
        <div class="column is-3 is-flex is-align-items-flex-end">
          <div class="field">
            <label class="label">&nbsp;</label>
            <div class="control">
              <button class="button is-info" (click)="aceptarAlmacen()" [disabled]="!Almacene_temporal.nombre?.trim()">
                <span class="icon"><i class="fas fa-plus"></i></span>
                <span>Agregar</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="tags-list mb-3" *ngIf="data.almacenes?.length">
        <span *ngFor="let almacen of data.almacenes; index as i" class="tag is-warning is-light is-medium">
          <i class="fas fa-warehouse mr-1"></i> {{ almacen.nombre }}
          <i class="fas fa-times tag-delete" (click)="confirmarEliminarAlmacen(i)"></i>
        </span>
      </div>

      <hr class="modal-divider" />
      <button class="button is-success" (click)="editar ? editarCliente() : guardar()" [disabled]="guardando">
        <span class="icon"><i class="fas" [ngClass]="guardando ? 'fa-spinner fa-pulse' : 'fa-save'"></i></span>
        <span>{{ guardando ? 'Guardando…' : 'Guardar' }}</span>
      </button>
    </div>
  </div>
</div>
