<app-nueva-categoria
  [nueva]="nueva"
  [editar]="editar"
  [data]="data"
  (onFinalizarProceso)="cerrar()"
  (onCloseModal)="cerrarSimple()"
>
</app-nueva-categoria>
<app-page-layout>
  <app-section-header
    title="Categorías"
    description="Clasificación de los productos"
    icon="fa-industry"
    color="purple"
  ></app-section-header>

  <button class="button is-info" (click)="nuevaCategoria()">
    <span class="icon"><i class="fas fa-plus-circle"></i></span>
    <span>Nueva Categoría</span>
  </button>
  <br /><br />

  <!-- Empty state -->
  <div *ngIf="!cargando && api.categorias.length === 0" class="empty-state">
    <i class="fas fa-tag empty-icon"></i>
    <p class="empty-title">No hay categorías registradas</p>
    <p class="empty-hint">Haz clic en el botón "Categoría" para comenzar</p>
    <i class="fas fa-arrow-up empty-arrow"></i>
  </div>

  <!-- Skeleton -->
  <div *ngIf="cargando && api.categorias.length === 0" class="grupo-grid">
    <div *ngFor="let _ of [].constructor(5)" class="card skeleton-card">
      <div class="card-header skeleton-header"></div>
      <div class="card-content">
        <div class="skeleton-line skeleton-line-short"></div>
      </div>
      <div class="card-footer skeleton-footer"></div>
    </div>
  </div>

  <!-- Card grid -->
  <div *ngIf="api.categorias.length > 0" class="grupo-grid">
    <div *ngFor="let cat of api.categorias; index as i" class="card grupo-card animate__animated animate__fadeInUp">
      <div class="card-header">
        <div class="card-header-title">
          <i class="fas fa-tag grupo-icon"></i>
          <span class="grupo-nombre">{{ cat.nombre }}</span>
        </div>
      </div>
      <footer class="card-footer">
        <a class="card-footer-item" (click)="editarInfo(cat)" title="Editar">
          <i class="far fa-edit green"></i>
        </a>
        <a class="card-footer-item" (click)="borrarCategoria(cat._id)" title="Eliminar">
          <i class="fas fa-trash-alt red"></i>
        </a>
      </footer>
    </div>
  </div>
</app-page-layout>
