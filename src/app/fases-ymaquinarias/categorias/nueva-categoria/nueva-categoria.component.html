<div class="modal" [ngClass]="{ 'is-active': nueva || editar }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente">
        <i class="fas" [ngClass]="nueva ? 'fa-tag' : 'fa-edit'"></i>&nbsp;
        {{ nueva ? 'Nueva categoría' : 'Editar categoría' }}
      </p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar()"></button>
    </div>
    <div class="modal-card-body light">
      <div class="field">
        <label class="label">Nombre</label>
        <div class="control">
          <input type="text" class="input" placeholder="Nombre de la categoría" [(ngModel)]="data.nombre" />
        </div>
      </div>

      <button class="button is-success" (click)="guardar()" *ngIf="nueva" [disabled]="guardando">
        <span class="icon"><i class="fas" [ngClass]="guardando ? 'fa-spinner fa-pulse' : 'fa-save'"></i></span>
        <span>{{ guardando ? 'Guardando…' : 'Guardar' }}</span>
      </button>
      <button class="button is-success" (click)="editar_categoria()" *ngIf="editar" [disabled]="guardando">
        <span class="icon"><i class="fas" [ngClass]="guardando ? 'fa-spinner fa-pulse' : 'fa-save'"></i></span>
        <span>{{ guardando ? 'Guardando…' : 'Guardar' }}</span>
      </button>
    </div>
  </div>
</div>
