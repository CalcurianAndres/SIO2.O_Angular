<div class="modal" [ngClass]="{ 'is-active': nueva || editar }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente">
        <i class="fas" [ngClass]="nueva ? 'fa-cog' : 'fa-edit'"></i>&nbsp;
        {{ nueva ? 'Nueva máquina' : 'Editar máquina' }}
      </p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar()"></button>
    </div>
    <div class="modal-card-body light">
      <div class="section-label"><i class="fas fa-tag"></i> Identificación</div>
      <div class="columns is-multiline">
        <div class="column is-4">
          <div class="field">
            <label class="label">Nombre</label>
            <div class="control">
              <input type="text" class="input" placeholder="Nombre de la máquina" [(ngModel)]="data.nombre" />
            </div>
          </div>
        </div>
        <div class="column is-4">
          <div class="field">
            <label class="label">Marca</label>
            <div class="control">
              <input type="text" class="input" placeholder="Marca" [(ngModel)]="data.marca" />
            </div>
          </div>
        </div>
        <div class="column is-4">
          <div class="field">
            <label class="label">Modelo</label>
            <div class="control">
              <input type="text" class="input" placeholder="Modelo" [(ngModel)]="data.modelo" />
            </div>
          </div>
        </div>
      </div>

      <hr class="modal-divider" />
      <div class="section-label"><i class="fas fa-cogs"></i> Especificaciones</div>
      <div class="columns is-multiline">
        <div class="column is-6">
          <div class="field">
            <label class="label">Serial</label>
            <div class="control">
              <input type="text" class="input" placeholder="Serial" [(ngModel)]="data.serial" />
            </div>
          </div>
        </div>
        <div class="column is-3">
          <div class="field">
            <label class="label">Año de fabricación</label>
            <div class="control">
              <input
                type="number"
                class="input"
                placeholder="2023"
                min="1900"
                max="2099"
                step="1"
                [(ngModel)]="data.ano"
              />
            </div>
          </div>
        </div>
        <div class="column is-3">
          <div class="field">
            <label class="label">Unidades / hora</label>
            <div class="control">
              <input type="number" class="input" placeholder="0" [(ngModel)]="data.trabajo" />
            </div>
          </div>
        </div>
        <div class="column is-3">
          <div class="field">
            <label class="label">Colores</label>
            <div class="control">
              <input type="number" class="input" placeholder="0" [(ngModel)]="data.colores" />
            </div>
          </div>
        </div>
      </div>

      <hr class="modal-divider" />
      <div class="section-label"><i class="fas fa-tasks"></i> Fases que ejecuta</div>
      <div class="columns is-multiline">
        <div class="column is-6">
          <div class="field has-addons">
            <div class="control is-expanded">
              <div class="select is-fullwidth">
                <select (change)="faseSeleccionada($event.target)">
                  <option value="#">Selecciona una fase</option>
                  <option value="{{ i }}" *ngFor="let fase of fases.fases; index as i">{{ fase.nombre }}</option>
                </select>
              </div>
            </div>
            <div class="control">
              <button class="button is-info" (click)="addFase()">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="tags" *ngIf="fasesQueTrabaja && fasesQueTrabaja.length > 0; else noFases">
        <span class="tag is-info is-light" *ngFor="let fase of fasesQueTrabaja">
          <i class="fas fa-check-circle"></i>&nbsp;{{ fase.nombre }}
          <button class="delete is-small" (click)="deleteFase(fase)"></button>
        </span>
      </div>
      <ng-template #noFases>
        <p class="empty-section">Sin fases asignadas</p>
      </ng-template>

      <hr class="modal-divider" />
      <div class="section-label"><i class="fas fa-ruler"></i> Pinzas</div>
      <div class="columns is-multiline">
        <div class="column is-6">
          <div class="field has-addons">
            <div class="control is-expanded">
              <input
                type="text"
                class="input"
                placeholder="Tamaño en mm"
                [(ngModel)]="PinzasSeleccionadas"
                (keyup.enter)="addPinza()"
              />
            </div>
            <div class="control">
              <button class="button is-info" (click)="addPinza()">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="tags" *ngIf="data.pinzas && data.pinzas.length > 0; else noPinzas">
        <span class="tag is-warning is-light" *ngFor="let pinza of data.pinzas; index as i">
          <i class="fas fa-ruler-combined"></i>&nbsp;{{ pinza }} mm
          <button class="delete is-small" (click)="deletePinza(i)"></button>
        </span>
      </div>
      <ng-template #noPinzas>
        <p class="empty-section">Sin pinzas registradas</p>
      </ng-template>

      <button class="button is-success" (click)="guardarMaquina()" *ngIf="nueva" [disabled]="guardando">
        <span class="icon"><i class="fas" [ngClass]="guardando ? 'fa-spinner fa-pulse' : 'fa-save'"></i></span>
        <span>{{ guardando ? 'Guardando…' : 'Guardar' }}</span>
      </button>
      <button class="button is-success" (click)="editarMaquina()" *ngIf="editar" [disabled]="guardando">
        <span class="icon"><i class="fas" [ngClass]="guardando ? 'fa-spinner fa-pulse' : 'fa-save'"></i></span>
        <span>{{ guardando ? 'Guardando…' : 'Guardar' }}</span>
      </button>
    </div>
  </div>
</div>
