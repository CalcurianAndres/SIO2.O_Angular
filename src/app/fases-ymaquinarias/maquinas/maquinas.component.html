<app-nueva-maquina
  [nueva]="nueva"
  [data]="data"
  [editar]="editar"
  [fasesQueTrabaja]="selectedFases"
  (onCloseModal)="cerrarSencilla()"
  (onFinalizarTarea)="cerrar()"
>
</app-nueva-maquina>
<app-info-maquinas [info]="info" [informacion]="data" (onCloseModal)="cerradoSencillo()"> </app-info-maquinas>
<app-page-layout>
  <app-section-header
    title="Máquinas"
    description="Registro de maquinaria industrial"
    icon="fa-industry"
    color="purple"
  ></app-section-header>

  <button class="button is-info" (click)="nuevaMaquina()">
    <span class="icon"><i class="fas fa-plus-circle"></i></span>
    <span>Nueva Máquina</span>
  </button>
  <br /><br />

  <!-- Empty state -->
  <div *ngIf="!cargando && api.maquinas.length === 0" class="empty-state">
    <i class="fas fa-cog empty-icon"></i>
    <p class="empty-title">No hay máquinas registradas</p>
    <p class="empty-hint">Haz clic en el botón "Máquina" para comenzar</p>
    <i class="fas fa-arrow-up empty-arrow"></i>
  </div>

  <!-- Skeleton -->
  <div *ngIf="cargando && api.maquinas.length === 0" class="grupo-grid">
    <div *ngFor="let _ of [].constructor(5)" class="card skeleton-card">
      <div class="card-header skeleton-header"></div>
      <div class="card-content">
        <div class="skeleton-line skeleton-line-short"></div>
      </div>
      <div class="card-footer skeleton-footer"></div>
    </div>
  </div>

  <!-- Card grid -->
  <div *ngIf="api.maquinas.length > 0" class="grupo-grid">
    <div *ngFor="let maq of api.maquinas; index as i" class="card grupo-card animate__animated animate__fadeInUp">
      <div class="card-header">
        <div class="card-header-title">
          <i class="fas fa-cog grupo-icon"></i>
          <span class="grupo-nombre">{{ maq.nombre }}</span>
          <span *ngIf="maq.marca || maq.modelo" class="maq-sub"> {{ maq.marca }} {{ maq.modelo }} </span>
        </div>
      </div>
      <div class="card-content" *ngIf="maq.fases && maq.fases.length > 0">
        <div class="tags">
          <span class="tag is-info is-light" *ngFor="let fase of maq.fases | slice: 0 : 3">
            {{ $any(fase).nombre || fase }}
          </span>
          <span class="tag is-light" *ngIf="maq.fases.length > 3">+{{ maq.fases.length - 3 }}</span>
        </div>
      </div>
      <footer class="card-footer">
        <a class="card-footer-item" (click)="seleccion(i)" title="Ver detalles">
          <i class="fas fa-info-circle blue_"></i>
        </a>
        <a class="card-footer-item" (click)="Editar(i)" title="Editar">
          <i class="far fa-edit green"></i>
        </a>
        <a class="card-footer-item" (click)="borrarMaquina(maq._id)" title="Eliminar">
          <i class="fas fa-trash-alt red"></i>
        </a>
      </footer>
    </div>
  </div>
</app-page-layout>
