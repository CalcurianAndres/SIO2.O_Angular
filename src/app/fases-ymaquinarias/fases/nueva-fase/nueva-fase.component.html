<div class="modal" [ngClass]="{ 'is-active': nueva || editar }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente">
        <i class="fas" [ngClass]="nueva ? 'fa-industry' : 'fa-edit'"></i>&nbsp;
        {{ nueva ? 'Nueva fase' : 'Editar fase' }}
      </p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar()"></button>
    </div>
    <div class="modal-card-body light">
      <div class="columns is-multiline">
        <div class="column is-12">
          <div class="field">
            <label class="label">Nombre</label>
            <div class="control">
              <input type="text" class="input" placeholder="Nombre de la fase" [(ngModel)]="data.nombre" />
            </div>
          </div>
        </div>
        <div class="column is-12">
          <div class="field">
            <label class="label">Descripción</label>
            <div class="control">
              <textarea
                class="textarea"
                cols="30"
                rows="2"
                placeholder="Descripción"
                [(ngModel)]="data.descripcion"
              ></textarea>
            </div>
          </div>
        </div>
      </div>

      <button class="button is-success" (click)="guardarFase()" *ngIf="nueva" [disabled]="guardando">
        <span class="icon"><i class="fas" [ngClass]="guardando ? 'fa-spinner fa-pulse' : 'fa-save'"></i></span>
        <span>{{ guardando ? 'Guardando…' : 'Guardar' }}</span>
      </button>
      <button class="button is-success" (click)="editarFase()" *ngIf="editar" [disabled]="guardando">
        <span class="icon"><i class="fas" [ngClass]="guardando ? 'fa-spinner fa-pulse' : 'fa-save'"></i></span>
        <span>{{ guardando ? 'Guardando…' : 'Guardar' }}</span>
      </button>
    </div>
  </div>
</div>
