<div class="modal" [ngClass]="{ 'is-active': material }">
  <div class="modal-background"></div>
  <div class="modal-card full animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente"><i class="fas fa-cubes"></i> Materiales del grupo</p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar()"></button>
    </div>
    <div class="modal-card-body">
      <!-- Agregar button -->
      <button class="button is-success mb-3" (click)="agregarMaterial()">
        <span class="icon"><i class="fas fa-plus-circle"></i></span>
        <span>Agregar Material</span>
      </button>

      <!-- Empty state -->
      <div *ngIf="!material_selected || material_selected.length === 0" class="has-text-centered py-5">
        <i class="fas fa-box-open" style="font-size: 2rem; color: var(--text-muted); opacity: 0.4"></i>
        <p class="mt-2" style="color: var(--text-muted)">No hay materiales en este grupo</p>
      </div>

      <!-- Table -->
      <ng-container *ngIf="material_selected && material_selected.length > 0">
        <div class="table-container">
          <table class="table is-fullwidth is-striped is-hoverable">
            <thead>
              <tr>
                <th>Material</th>
                <th>Serie</th>
                <th>Fabricante</th>
                <th>Cód. Proveedor</th>
                <th class="has-text-centered">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let material of paginatedMaterials; index as i">
                <td>{{ material.nombre }}</td>
                <td>{{ material.serie }}</td>
                <td>{{ material.fabricante?.alias || '-' }}</td>
                <td>{{ material.codigo || '-' }}</td>
                <td class="has-text-centered">
                  <i class="far fa-edit green mr-2" title="Editar"></i>
                  <i class="fas fa-trash-alt red" (click)="eliminarMaterial(material._id)" title="Eliminar"></i>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="is-flex is-align-items-center is-justify-content-space-between mt-3">
          <div class="is-flex is-align-items-center">
            <span class="mr-2" style="font-size: 0.85rem; color: var(--text-muted)">Filas por página:</span>
            <div class="select" style="width: auto">
              <select (change)="changePageSize($event)" style="font-size: 0.85rem; padding: 2px 24px 2px 8px">
                <option *ngFor="let size of pageSizes" [value]="size" [selected]="size === pageSize">{{ size }}</option>
              </select>
            </div>
          </div>
          <div class="is-flex is-align-items-center" style="gap: 4px">
            <button class="button is-small" [disabled]="currentPage === 1" (click)="goToPage(currentPage - 1)">
              <i class="fas fa-chevron-left"></i>
            </button>
            <span style="font-size: 0.85rem; color: var(--text-muted); padding: 0 8px">
              Pág {{ currentPage }} de {{ totalPages }}
            </span>
            <button class="button is-small" [disabled]="currentPage === totalPages" (click)="goToPage(currentPage + 1)">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
