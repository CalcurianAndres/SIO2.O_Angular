<app-nuevo-grupo
  [nuevo]="nuevo"
  [editar]="editar"
  [data]="data"
  [api]="api"
  [cargando]="cargando"
  [otro]="otro"
  [trato]="trato"
  (onCloseModal)="cerrarModal()"
  (onCloseModal_)="cerrarModal_()"
>
</app-nuevo-grupo>

<app-materiales
  [material_selected]="material_selected"
  [material]="material"
  (onCloseModal)="cerrarMateriales()"
  (onAgregarMaterial)="NuevoMaterial()"
>
</app-materiales>

<app-nuevo-material
  [nuevo_material]="nuevo_material"
  [cargando]="cargando"
  [selectedGrupo]="selectedGrupo"
  (onCloseModal)="cerrarNuevoMaterial()"
  (onCloseModal_)="cerrarModal_()"
>
</app-nuevo-material>

<app-page-layout>
  <app-section-header
    title="Grupo de materiales"
    description="Clasificación de materiales por categoría"
    icon="fa-shopping-cart"
    color="green"
  >
  </app-section-header>

  <button class="button is-info" (click)="AgregarNuevo()">
    <span class="icon"><i class="fas fa-plus-circle"></i></span>
    <span>Nuevo Grupo</span>
  </button>
  <br /><br />

  <!-- Empty state -->
  <div *ngIf="!cargando && api.grupos.length === 0" class="empty-state">
    <i class="fas fa-cubes empty-icon"></i>
    <p class="empty-title">Crea tu primer grupo</p>
    <p class="empty-hint">Haz clic en el botón "Nuevo Grupo" para comenzar</p>
    <i class="fas fa-arrow-up empty-arrow"></i>
  </div>

  <!-- Skeleton -->
  <div *ngIf="cargando && api.grupos.length === 0" class="grupo-grid">
    <div *ngFor="let _ of [].constructor(5)" class="card skeleton-card">
      <div class="card-header skeleton-header"></div>
      <div class="card-content">
        <div class="skeleton-line skeleton-line-short"></div>
      </div>
      <div class="card-footer skeleton-footer"></div>
    </div>
  </div>

  <!-- Card grid -->
  <div *ngIf="api.grupos.length > 0" class="grupo-grid">
    <div *ngFor="let grupo of api.grupos" class="card grupo-card animate__animated animate__fadeInUp">
      <div class="card-header">
        <div class="card-header-title">
          <i class="{{ grupo.icono || 'fa-cube' }} grupo-icon"></i>
          <span class="grupo-nombre">{{ grupo.nombre }}</span>
          <span *ngIf="grupo.parcial" class="badge parcial-badge"> <i class="fas fa-glass-whiskey"></i> Parcial </span>
        </div>
      </div>
      <footer class="card-footer">
        <a class="card-footer-item" (click)="buscarMaterial(grupo)" title="Ver materiales">
          <i class="fas fa-info-circle blue_"></i>
        </a>
        <a class="card-footer-item" (click)="EditarGrupo(grupo)" title="Editar">
          <i class="far fa-edit green"></i>
        </a>
        <a class="card-footer-item" (click)="eliminarGrupo(grupo._id)" title="Eliminar">
          <i class="fas fa-trash-alt red"></i>
        </a>
      </footer>
    </div>
  </div>
</app-page-layout>
