<!-- Nuevo material modal -->
<div class="modal" [ngClass]="{ 'is-active': nuevo_material }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente"><i class="fas fa-box"></i> Nuevo Material</p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar_()"></button>
    </div>
    <div class="modal-card-body">
      <div class="field">
        <label class="label">Grupo</label>
        <div class="control">
          <div class="select">
            <select [(ngModel)]="grupo" (change)="buscarFabricante($event.target)">
              <option value="">Seleccionar grupo</option>
              <option *ngFor="let grupo of grupos.grupos; index as i" [value]="i">
                {{ grupo.nombre }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label">Nombre del material</label>
        <div class="control">
          <input type="text" class="input" placeholder="Ej: Bond 75g" [(ngModel)]="nombre" />
        </div>
      </div>

      <div class="columns">
        <div class="column">
          <div class="field">
            <label class="label">Fabricante</label>
            <div class="control">
              <div class="select">
                <select [(ngModel)]="Fabricante">
                  <option value="">Seleccionar</option>
                  <option *ngFor="let fab of Fabricantes; index as i" [value]="i">{{ fab.alias }}</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="column">
          <div class="field">
            <label class="label">Serie</label>
            <div class="control">
              <input type="text" class="input" placeholder="Ej: A-1" [(ngModel)]="serie" />
            </div>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label">Código de proveedor</label>
        <div class="control">
          <input type="text" class="input" placeholder="Ej: PROV-001" [(ngModel)]="codigo" />
        </div>
      </div>

      <br />
      <button class="button is-success" [disabled]="guardando" (click)="guardarMaterial()">
        <span class="icon" *ngIf="guardando"><i class="fas fa-spinner fa-pulse"></i></span>
        <span class="icon" *ngIf="!guardando"><i class="fas fa-save"></i></span>
        <span>{{ guardando ? 'Guardando...' : 'Guardar' }}</span>
      </button>
    </div>
  </div>
</div>
