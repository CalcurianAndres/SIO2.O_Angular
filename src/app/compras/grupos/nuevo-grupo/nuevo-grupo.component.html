<!-- Nuevo grupo modal -->
<div class="modal" [ngClass]="{ 'is-active': nuevo && !editar }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente"><i class="fas fa-cube"></i> Nuevo Grupo</p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar_()"></button>
    </div>
    <div class="modal-card-body">
      <div class="field">
        <label class="label">Nombre del grupo</label>
        <div class="control">
          <input type="text" class="input" placeholder="Ej: Papel Bond, Tintas, Envases..." [(ngModel)]="nombre" />
        </div>
      </div>
      <div class="field">
        <label class="checkbox">
          <input type="checkbox" [(ngModel)]="parcial" />
          <span>Entrega parcial</span>
        </label>
      </div>
      <div class="field">
        <label class="checkbox">
          <input type="checkbox" [(ngModel)]="trato" (change)="verTrato($event.target)" />
          <span>Tratar como sustrato</span>
        </label>
      </div>
      <div class="field">
        <label class="checkbox">
          <input type="checkbox" [(ngModel)]="otro" (change)="verOtro($event.target)" />
          <span>Tratar como material sin análisis</span>
        </label>
      </div>
      <br />
      <button class="button is-success" [disabled]="guardando" (click)="nuevoGrupo()">
        <span class="icon" *ngIf="guardando"><i class="fas fa-spinner fa-pulse"></i></span>
        <span class="icon" *ngIf="!guardando"><i class="fas fa-save"></i></span>
        <span>{{ guardando ? 'Guardando...' : 'Guardar' }}</span>
      </button>
    </div>
  </div>
</div>

<!-- Editar grupo modal -->
<div class="modal" [ngClass]="{ 'is-active': editar }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente"><i class="fas fa-edit"></i> Editar Grupo</p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar_()"></button>
    </div>
    <div class="modal-card-body">
      <div class="field">
        <label class="label">Nombre del grupo</label>
        <div class="control">
          <input type="text" class="input" [(ngModel)]="data.nombre" />
        </div>
      </div>
      <div class="field">
        <label class="checkbox">
          <input type="checkbox" [(ngModel)]="data.parcial" />
          <span>Entrega parcial</span>
        </label>
      </div>
      <div class="field">
        <label class="checkbox">
          <input type="checkbox" [checked]="trato" (change)="verTrato($event.target)" />
          <span>Tratar como sustrato</span>
        </label>
      </div>
      <div class="field">
        <label class="checkbox">
          <input type="checkbox" [checked]="otro" (change)="verOtro($event.target)" />
          <span>Tratar como material sin análisis</span>
        </label>
      </div>
      <br />
      <button class="button is-success" [disabled]="guardando" (click)="EditarGrupo()">
        <span class="icon" *ngIf="guardando"><i class="fas fa-spinner fa-pulse"></i></span>
        <span class="icon" *ngIf="!guardando"><i class="fas fa-save"></i></span>
        <span>{{ guardando ? 'Guardando...' : 'Guardar cambios' }}</span>
      </button>
    </div>
  </div>
</div>
