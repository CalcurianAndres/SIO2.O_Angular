<app-nuevo-proveedor
  [nuevo]="nuevo"
  [editar]="editar"
  [api]="api"
  [cargando]="cargando"
  [proveedor]="proveedor_selected"
  (onCloseModal)="cerrar()"
  (onCloseModal_)="cerrar_()"
>
</app-nuevo-proveedor>

<app-detalles-proveedores [proveedor]="proveedor_selected" [detalle]="detalle" (onCloseModal)="detalle = false">
</app-detalles-proveedores>

<app-page-layout>
  <app-section-header
    title="Proveedores"
    description="Gestión de proveedores y materiales"
    icon="fa-shopping-cart"
    color="green"
  ></app-section-header>

  <button class="button is-info" (click)="nuevo = true">
    <span class="icon"><i class="fas fa-plus-circle"></i></span>
    <span>Nuevo Proveedor</span>
  </button>
  <br /><br />

  <!-- Empty state -->
  <div *ngIf="!cargando && api.proveedores.length === 0" class="empty-state">
    <i class="fas fa-truck empty-icon"></i>
    <p class="empty-title">No hay proveedores registrados</p>
    <p class="empty-hint">Haz clic en el botón "Nuevo Proveedor" para comenzar</p>
    <i class="fas fa-arrow-up empty-arrow"></i>
  </div>

  <!-- Skeleton -->
  <div *ngIf="cargando && api.proveedores.length === 0" class="grupo-grid">
    <div *ngFor="let _ of [].constructor(5)" class="card skeleton-card">
      <div class="card-header skeleton-header"></div>
      <div class="card-content">
        <div class="skeleton-line skeleton-line-short"></div>
      </div>
      <div class="card-footer skeleton-footer"></div>
    </div>
  </div>

  <!-- Card grid -->
  <div *ngIf="api.proveedores.length > 0" class="grupo-grid">
    <div *ngFor="let prov of api.proveedores; index as i" class="card grupo-card animate__animated animate__fadeInUp">
      <div class="card-header">
        <div class="card-header-title">
          <i class="fas fa-truck grupo-icon"></i>
          <span class="grupo-nombre">{{ prov.nombre }}</span>
        </div>
      </div>
      <footer class="card-footer">
        <a class="card-footer-item" (click)="VerProveedor(i)" title="Ver detalles">
          <i class="fas fa-info-circle blue_"></i>
        </a>
        <a class="card-footer-item" (click)="EditarProveedor(i)" title="Editar">
          <i class="far fa-edit green"></i>
        </a>
        <a class="card-footer-item" (click)="borrarFabricante(prov._id)" title="Eliminar">
          <i class="fas fa-trash-alt red"></i>
        </a>
      </footer>
    </div>
  </div>
</app-page-layout>
