<div class="modal" [ngClass]="{ 'is-active': detalle }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp" *ngIf="proveedor">
    <div class="modal-card-head">
      <p class="modal-card-title fuente"><i class="fas fa-truck"></i> {{ proveedor.nombre }}</p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar()"></button>
    </div>

    <div class="modal-card-body">
      <!-- Dirección -->
      <div class="detail-row">
        <span class="detail-label"><i class="fas fa-map-marker-alt"></i> Dirección</span>
        <span class="detail-value">{{ proveedor.direccion || '—' }}</span>
      </div>

      <div class="detail-row">
        <span class="detail-label"><i class="fas fa-id-card"></i> RIF</span>
        <span class="detail-value">{{ proveedor.rif || '—' }}</span>
      </div>

      <!-- Contactos -->
      <hr class="modal-divider" />
      <label class="section-label"><i class="fas fa-address-card"></i> Contactos</label>
      <div class="tags-list" *ngIf="proveedor.contactos && proveedor.contactos.length > 0">
        <span class="tag is-info is-light" *ngFor="let c of proveedor.contactos">
          <i class="fas fa-user"></i> {{ c.nombre }}
          <span class="contact-detail" *ngIf="c.numero"><i class="fas fa-phone"></i> {{ c.numero }}</span>
          <span class="contact-detail" *ngIf="c.email"><i class="fas fa-at"></i> {{ c.email }}</span>
        </span>
      </div>
      <p class="empty-hint" *ngIf="!proveedor.contactos || proveedor.contactos.length === 0">
        Sin contactos registrados
      </p>

      <!-- Fabricantes -->
      <hr class="modal-divider" />
      <label class="section-label"><i class="fas fa-industry"></i> Fabricantes que provee</label>
      <div class="tags-list" *ngIf="proveedor.fabricantes && proveedor.fabricantes.length > 0">
        <span class="tag is-info is-light" *ngFor="let f of proveedor.fabricantes">
          <i class="fas fa-industry"></i> {{ f.alias || f.nombre }}
        </span>
      </div>
      <p class="empty-hint" *ngIf="!proveedor.fabricantes || proveedor.fabricantes.length === 0">
        Sin fabricantes asociados
      </p>
    </div>
  </div>
</div>
