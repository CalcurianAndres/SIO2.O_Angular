<div class="modal" [ngClass]="{ 'is-active': nuevo || editar }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente">
        <i class="fas" [ngClass]="nuevo ? 'fa-truck' : 'fa-edit'"></i>
        {{ nuevo ? 'Nuevo Proveedor' : 'Editar Proveedor' }}
      </p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar_()"></button>
    </div>

    <div class="modal-card-body">
      <!-- Nombre -->
      <div class="field">
        <label class="label">Nombre</label>
        <div class="control">
          <input
            type="text"
            class="input"
            placeholder="Razón social del proveedor"
            [(ngModel)]="nombre"
            *ngIf="nuevo"
          />
          <input type="text" class="input" [(ngModel)]="proveedor.nombre" *ngIf="editar" />
        </div>
      </div>

      <!-- Dirección -->
      <div class="field">
        <label class="label">Dirección</label>
        <div class="control">
          <input type="text" class="input" placeholder="Dirección fiscal" [(ngModel)]="direccion" *ngIf="nuevo" />
          <input type="text" class="input" [(ngModel)]="proveedor.direccion" *ngIf="editar" />
        </div>
      </div>

      <!-- RIF -->
      <div class="field">
        <label class="label">RIF</label>
        <div class="control">
          <input
            type="text"
            class="input"
            maxlength="12"
            placeholder="J-XXXXXXXX-X"
            [(ngModel)]="rif"
            *ngIf="nuevo"
            (keyup)="formatRif($event)"
          />
          <input type="text" class="input" [(ngModel)]="proveedor.rif" *ngIf="editar" />
        </div>
      </div>

      <!-- Sección: Contactos -->
      <hr class="modal-divider" />
      <label class="section-label"><i class="fas fa-address-card"></i> Contactos</label>

      <div class="columns is-mobile is-variable is-2">
        <div class="column">
          <input type="text" class="input" placeholder="Nombre" [(ngModel)]="contacto_nombre" />
        </div>
        <div class="column">
          <input type="text" class="input" placeholder="Teléfono" [(ngModel)]="contacto_numero" />
        </div>
        <div class="column">
          <input type="email" class="input" placeholder="Correo" [(ngModel)]="contacto_email" />
        </div>
        <div class="column is-narrow">
          <button
            class="button is-info"
            [disabled]="!(contacto_nombre && contacto_numero && isValidEmail(contacto_email))"
            (click)="nuevo ? NuevoContacto() : NuevoContacto_()"
          >
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>

      <!-- Tags: contactos -->
      <div class="tags-list" *ngIf="(nuevo ? contactos : proveedor?.contactos)?.length > 0">
        <span class="tag is-info is-light" *ngFor="let c of nuevo ? contactos : proveedor.contactos; index as i">
          <i class="fas fa-user"></i> {{ c.nombre }} – {{ c.numero }}
          <button
            class="delete is-small"
            (click)="nuevo ? EliminarContacto(i) : proveedor.contactos.splice(i, 1)"
          ></button>
        </span>
      </div>

      <!-- Sección: Fabricantes -->
      <hr class="modal-divider" />
      <label class="section-label"><i class="fas fa-industry"></i> Fabricantes que provee</label>

      <div class="field is-grouped">
        <div class="control is-expanded">
          <div class="select is-fullwidth">
            <select (change)="fabricante_selected($event.target)">
              <option value="#">— Seleccionar fabricante —</option>
              <option *ngFor="let f of fabricantes.fabricantes; index as i" [value]="i">
                {{ f.alias || f.nombre }}
              </option>
            </select>
          </div>
        </div>
        <div class="control">
          <button class="button is-info" (click)="nuevo ? addFabricante() : addFabricante_()">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>

      <!-- Tags: fabricantes -->
      <div class="tags-list" *ngIf="(nuevo ? fabricantes_array_name : proveedor?.fabricantes)?.length > 0">
        <span
          class="tag is-info is-light"
          *ngFor="let f of nuevo ? fabricantes_array_name : getFabricanteNames(proveedor.fabricantes); index as i"
        >
          <i class="fas fa-industry"></i> {{ f }}
          <button
            class="delete is-small"
            (click)="nuevo ? EliminarFabricante(i) : proveedor.fabricantes.splice(i, 1)"
          ></button>
        </span>
      </div>

      <!-- Guardar button -->
      <hr class="modal-divider" />
      <div class="field">
        <div class="control">
          <button
            class="button is-success"
            [disabled]="guardando"
            (click)="nuevo ? GuardarProveedor() : EditarProveedor()"
          >
            <span class="icon" *ngIf="guardando"><i class="fas fa-spinner fa-pulse"></i></span>
            <span class="icon" *ngIf="!guardando"><i class="fas fa-save"></i></span>
            <span>{{ guardando ? 'Guardando...' : nuevo ? 'Guardar proveedor' : 'Guardar cambios' }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
