<div class="modal" [ngClass]="{ 'is-active': nuevo || editar }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente">
        <i class="fas" [ngClass]="nuevo ? 'fa-industry' : 'fa-edit'"></i>
        {{ nuevo ? 'Nuevo Fabricante' : 'Editar Fabricante' }}
      </p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar_()"></button>
    </div>

    <div class="modal-card-body">
      <!-- Razón social -->
      <div class="field">
        <label class="label">Razón social</label>
        <div class="control">
          <input type="text" class="input" placeholder="Ej: Papeles del Sur, C.A." [(ngModel)]="nombre" *ngIf="nuevo" />
          <input type="text" class="input" [(ngModel)]="data.nombre" *ngIf="!nuevo" />
        </div>
      </div>

      <!-- Alias -->
      <div class="field">
        <label class="label">Alias</label>
        <div class="control">
          <input type="text" class="input" placeholder="Ej: Papeles" [(ngModel)]="alias" *ngIf="nuevo" />
          <input type="text" class="input" [(ngModel)]="data.alias" *ngIf="!nuevo" />
        </div>
      </div>

      <!-- Sección: Origen -->
      <hr class="modal-divider" />
      <label class="label section-label"><i class="fas fa-globe-americas"></i> Origen</label>

      <div class="field is-grouped">
        <div class="control is-expanded">
          <div class="select is-fullwidth">
            <select name="pais" [(ngModel)]="pais">
              <option value="">— Seleccionar país —</option>
              <option *ngFor="let p of paises" [value]="p">{{ p }}</option>
            </select>
          </div>
        </div>
        <div class="control" *ngIf="pais">
          <input type="text" class="input" placeholder="Estado / Región" [(ngModel)]="estado" />
        </div>
        <div class="control" *ngIf="pais && estado">
          <button class="button is-info" (click)="nuevo ? addOrigen() : addOrigen_()">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>

      <!-- Tags: origenes added -->
      <div class="tags-list" *ngIf="nuevo ? origenes.length > 0 : (data?.origenes?.length ?? 0) > 0">
        <span class="tag is-info is-light" *ngFor="let o of nuevo ? origenes : data?.origenes || []; index as i">
          <i class="fas fa-flag"></i> {{ o.pais }} ({{ o.estado }})
          <button class="delete is-small" (click)="nuevo ? deleteOrigen(i) : deleteOrigen_(i)"></button>
        </span>
      </div>

      <!-- Sección: Grupo que fabrica -->
      <hr class="modal-divider" />
      <label class="label section-label"><i class="fas fa-layer-group"></i> Grupo que fabrica</label>

      <div class="field is-grouped">
        <div class="control is-expanded">
          <div class="select is-fullwidth">
            <select [(ngModel)]="grupo">
              <option value="">— Seleccionar grupo —</option>
              <option *ngFor="let g of api.grupos" [value]="g.nombre + '*' + g._id">{{ g.nombre }}</option>
            </select>
          </div>
        </div>
        <div class="control" *ngIf="grupo">
          <button class="button is-info" (click)="nuevo ? addGrupo() : addGrupo_()">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>

      <!-- Tags: grupos added -->
      <div class="tags-list" *ngIf="nuevo ? grupos.length > 0 : (data?.grupo?.length ?? 0) > 0">
        <span class="tag is-info is-light" *ngFor="let g of nuevo ? grupos : data?.grupo || []; index as i">
          <i class="fas fa-cube"></i> {{ g.nombre }}
          <button class="delete is-small" (click)="nuevo ? deleteGrupo(i) : deleteGrupo_(i)"></button>
        </span>
      </div>

      <!-- Proveedor directo checkbox (solo en nuevo) -->
      <ng-container *ngIf="nuevo">
        <hr class="modal-divider" />
        <label class="checkbox">
          <input type="checkbox" (change)="proveedor($event.target)" />
          <span>Proveedor directo</span>
        </label>
      </ng-container>

      <ng-container *ngIf="editar">
        <hr class="modal-divider" />
        <a class="is-link" (click)="BuscarProveedor()"> <i class="fas fa-truck"></i> Ver información de proveedor </a>
      </ng-container>

      <!-- Sección: Proveedor directo (expanded) -->
      <div class="proveedor-section" *ngIf="proveedor_directo || proveedor_directo_abierto">
        <hr class="modal-divider" />
        <label class="label section-label"><i class="fas fa-truck"></i> Datos de proveedor</label>

        <div class="field">
          <label class="label">Dirección</label>
          <div class="control">
            <input type="text" class="input" placeholder="Dirección fiscal" [(ngModel)]="p_direccion" *ngIf="nuevo" />
            <input
              type="text"
              class="input"
              [(ngModel)]="proveedor_directo_selected[0].direccion"
              *ngIf="proveedor_directo_abierto && !nuevo"
            />
          </div>
        </div>

        <div class="field">
          <label class="label">RIF</label>
          <div class="control">
            <input
              type="text"
              class="input"
              maxlength="12"
              placeholder="J-XXXXXXXX-X"
              (input)="addGuion()"
              [(ngModel)]="p_rif"
              *ngIf="nuevo"
            />
            <input
              type="text"
              class="input"
              maxlength="12"
              (input)="addGuion()"
              [(ngModel)]="proveedor_directo_selected[0].rif"
              *ngIf="proveedor_directo_abierto && !nuevo"
            />
          </div>
        </div>

        <!-- Contacto form -->
        <label class="label section-label" style="font-size: 0.85rem; margin-top: 0.5rem">
          <i class="fas fa-address-card"></i> Contacto
        </label>
        <div class="columns is-mobile is-variable is-2">
          <div class="column">
            <input type="text" class="input" placeholder="Nombre" [(ngModel)]="p_nombre" />
          </div>
          <div class="column">
            <input type="text" class="input" placeholder="Teléfono" [(ngModel)]="p_telefono" />
          </div>
          <div class="column">
            <input
              type="email"
              class="input"
              placeholder="Correo"
              [(ngModel)]="p_correo"
              (input)="validateEmail(p_correo)"
            />
          </div>
          <div class="column">
            <input type="text" class="input" placeholder="Cargo" [(ngModel)]="p_cargo" />
          </div>
          <div class="column is-narrow">
            <button
              class="button is-info"
              [disabled]="!(p_nombre && p_telefono && correo_valido && p_cargo)"
              (click)="nuevo ? AgregarContacto() : AgregarContacto_()"
            >
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>
        <p id="validationMessage" class="help is-danger" style="display: none"></p>

        <!-- Contactos table -->
        <table
          class="table is-fullwidth is-narrow"
          *ngIf="(nuevo ? p_contacto : proveedor_directo_selected?.[0]?.contactos)?.length > 0"
        >
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Correo</th>
              <th>Cargo</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of nuevo ? p_contacto : proveedor_directo_selected[0].contactos; index as i">
              <td>{{ c.nombre }}</td>
              <td>{{ c.numero || c.telefono }}</td>
              <td>{{ c.email || c.correo }}</td>
              <td>{{ c.cargo }}</td>
              <td><i class="fas fa-trash-alt red" (click)="nuevo ? deletecontacto(i) : deletecontacto_(i)"></i></td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Guardar / Editar button -->
      <hr class="modal-divider" />
      <div class="field">
        <div class="control">
          <button
            class="button is-success"
            [disabled]="guardando"
            (click)="nuevo ? guardarFabricante() : editarFabricante()"
          >
            <span class="icon" *ngIf="guardando"><i class="fas fa-spinner fa-pulse"></i></span>
            <span class="icon" *ngIf="!guardando"><i class="fas fa-save"></i></span>
            <span>{{ guardando ? 'Guardando...' : nuevo ? 'Guardar fabricante' : 'Guardar cambios' }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
