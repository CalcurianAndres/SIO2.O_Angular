<app-page-layout>
  <app-section-header
    title="Fabricantes"
    description="Registro de fabricantes homologados"
    icon="fa-shopping-cart"
    color="green"
  ></app-section-header>

  <button class="button is-info" (click)="nuevo = true">
    <span class="icon"><i class="fas fa-plus-circle"></i></span>
    <span>Nuevo Fabricante</span>
  </button>
  <br /><br />

  <!-- Empty state -->
  <div *ngIf="!cargando && api.fabricantes.length === 0" class="empty-state">
    <i class="fas fa-industry empty-icon"></i>
    <p class="empty-title">No hay fabricantes registrados</p>
    <p class="empty-hint">Haz clic en el botón "Nuevo Fabricante" para comenzar</p>
    <i class="fas fa-arrow-up empty-arrow"></i>
  </div>

  <!-- Skeleton -->
  <div *ngIf="cargando && api.fabricantes.length === 0" class="grupo-grid">
    <div *ngFor="let _ of [].constructor(5)" class="card skeleton-card">
      <div class="card-header skeleton-header"></div>
      <div class="card-content">
        <div class="skeleton-line skeleton-line-short"></div>
      </div>
      <div class="card-footer skeleton-footer"></div>
    </div>
  </div>

  <!-- Card grid -->
  <div *ngIf="api.fabricantes.length > 0" class="grupo-grid">
    <div *ngFor="let fab of api.fabricantes; index as i" class="card grupo-card animate__animated animate__fadeInUp">
      <div class="card-header">
        <div class="card-header-title">
          <i class="fas fa-industry grupo-icon"></i>
          <span class="grupo-nombre">{{ fab.nombre }}</span>
          <span *ngIf="fab.alias" class="fab-alias">({{ fab.alias }})</span>
          <span *ngIf="fab.proveedor" class="badge proveedor-badge"> <i class="fas fa-truck"></i> Proveedor </span>
        </div>
      </div>
      <footer class="card-footer">
        <a class="card-footer-item" (click)="seleccion(i)" title="Ver detalles">
          <i class="fas fa-info-circle blue_"></i>
        </a>
        <a class="card-footer-item" (click)="Editar(i)" title="Editar">
          <i class="far fa-edit green"></i>
        </a>
        <a class="card-footer-item" (click)="borrarFabricante(fab._id)" title="Eliminar">
          <i class="fas fa-trash-alt red"></i>
        </a>
      </footer>
    </div>
  </div>
</app-page-layout>

<app-nuevo-fabricante
  [nuevo]="nuevo"
  [editar]="editar"
  [data]="data"
  [cargando]="cargando"
  (onCloseModal)="cerrar()"
  (onCloseModal_)="cerrar__()"
>
</app-nuevo-fabricante>

<app-detalles [detalle]="detalle" [fabricante]="selected" (onClickClose)="detalle = false"></app-detalles>
