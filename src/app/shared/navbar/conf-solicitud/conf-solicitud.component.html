<div class="modal" [ngClass]="{ 'is-active': solicitud }">
  <div class="modal-background"></div>
  <div class="modal-card animate__animated animate__fadeInUp">
    <div class="modal-card-head">
      <p class="modal-card-title fuente">Confirmar Devolución</p>
      <button class="delete red_cross" aria-label="close" (click)="cerrar()"></button>
    </div>
    <div class="modal-card-body light" *ngIf="api.buscarSolicitudPorID(id_solicitud)">
      <span class="title" *ngIf="api.buscarSolicitudPorID(id_solicitud).op">
        op: {{ api.buscarSolicitudPorID(id_solicitud).op.numero_op }}
      </span>
      <br />
      {{ api.buscarSolicitudPorID(id_solicitud).motivo }}
      <hr />
      <table class="table is-fullwidth is-striped">
        <thead>
          <tr>
            <th>Material</th>
            <th>Cantidad</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let material of api.buscarSolicitudPorID(id_solicitud).materiales; index as i">
            <td>{{ material.material.nombre }} <br /></td>
            <td>{{ material.cantidad }} {{ material.material.unidad }}</td>
          </tr>
        </tbody>
      </table>
      <div class="field is-grouped">
        <div class="control">
          <button class="button is-success" (click)="AprobarSolicitud()">
            <span class="icon"><i class="fas fa-check"></i></span>
          </button>
        </div>
        <div class="control">
          <button class="button is-danger">
            <span class="icon"><i class="fas fa-ban"></i></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
