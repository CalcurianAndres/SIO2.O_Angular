<div class="card mt-5 title_" [ngClass]="color" [style.background]="gradient || null">
    <div class="card-content">
        <h1 class="title blancas">{{ title }}</h1>
        <h2 class="subtitle description blancas">{{ description }}</h2>
    </div>
    <div class="iconos">
        <i class="fas {{ icon }}"></i>
    </div>
</div>
